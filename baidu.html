<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的百度搜索</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            width: 400px;
            height: 36px;
            font-size: 16px;
            padding-left: 10px;
        }
        button {
            height: 40px;
            font-size: 16px;
            cursor: pointer;
        }
        iframe {
            margin-top: 20px;
            width: 90%;
            height: 600px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h2>🔍 百度搜索</h2>

    <form onsubmit="searchBaidu(); return false;">
        <input type="text" id="keyword" placeholder="请输入搜索关键词">
        <button type="submit">搜索</button>
    </form>

    <iframe id="baiduFrame"></iframe>

    <script>
        function searchBaidu() {
            const keyword = document.getElementById('keyword').value;
            if (keyword.trim() === '') return;
            const url = 'https://www.baidu.com/s?wd=' + encodeURIComponent(keyword);
            document.getElementById('baiduFrame').src = url;
        }
    </script>

</body>
</html>
